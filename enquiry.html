<!DOCTYPE html>
<html>
<head>
    <title>Boxwish CRM - New Enquiry</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>New Enquiry</h1>

    <div class="card">

        <h2>Client Information</h2>

        <input type="text" placeholder="Company Name"><br><br>

        <input type="text" placeholder="Contact Person"><br><br>

        <input type="text" placeholder="Mobile Number"><br><br>

        <input type="email" placeholder="Email ID"><br><br>

        <input type="text" placeholder="City"><br><br>

    </div>

    <div class="card">

        <h2>Initial Requirement</h2>

        <input type="text" placeholder="Product Category"><br><br>

        <input type="text" placeholder="Product Details"><br><br>

        <input type="number" placeholder="Approx Quantity"><br><br>

        <input type="text" placeholder="Budget Per Piece"><br><br>

        <input type="date"><br><br>

        <textarea placeholder="Discussion Notes"></textarea><br><br>

        <button>Save Enquiry</button>

    </div>

</div>

</body>
</html>
