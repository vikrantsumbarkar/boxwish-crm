<!DOCTYPE html>
<html>
<head>
    <title>Boxwish CRM - New Enquiry</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>NEW ENQUIRY</h1>

    <!-- CLIENT INFORMATION -->

    <div class="card">

        <h2>CLIENT INFORMATION</h2>

        <div class="grid-2">

            <input type="text" placeholder="Client Name">
            <input type="text" placeholder="Company Name">

            <input type="text" placeholder="Contact Person">
            <input type="text" placeholder="Mobile Number">

            <input type="text" placeholder="Designation">
            <input type="email" placeholder="Email ID">

            <input type="text" placeholder="Department">
            <input type="text" placeholder="City">

        </div>

    </div>

    <!-- LEAD SOURCE -->

    <div class="card">

        <h2>LEAD SOURCE</h2>

        <div class="grid-3">

            <select>
                <option>Select Source</option>
                <option>WhatsApp</option>
                <option>Google</option>
                <option>Reference</option>
                <option>LinkedIn</option>
                <option>Website</option>
                <option>IndiaMart</option>
                <option>Walk In</option>
            </select>

            <input type="date">

            <select>
                <option>Priority</option>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>

        </div>

    </div>

    <!-- INITIAL REQUIREMENT -->

    <div class="card">

        <h2>INITIAL REQUIREMENT</h2>

        <div class="grid-2">

            <input type="text" placeholder="Product Category">
            <input type="text" placeholder="Product Details">

            <input type="number" placeholder="Approx Quantity">
            <input type="text" placeholder="Budget Per Piece">

            <input type="date">
            <input type="text" placeholder="Expected Order Value">

        </div>

        <textarea placeholder="Discussion Notes"></textarea>

    </div>

    <!-- ACTION BUTTONS -->

    <div class="button-area">

        <button class="save-btn">
            Save Enquiry
        </button>

        <button class="clear-btn" type="reset">
            Clear
        </button>

    </div>

</div>

</body>
</html>
