<!DOCTYPE html>
<html>
<head>
    <title>Boxwish CRM - New Enquiry</title>
    <link rel="stylesheet" href="style.css">
</head>
<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyg--nc4QfbmV4hxUFVYFSouLoqR9dfuaxiWWBGDpdQKbs0yhNWQN63gJHX2a4MDVQcSQ/exec";

async function saveEnquiry() {

    const data = {
        enquiryId: "ENQ" + Date.now(),
        clientId: "CL" + Date.now(),
        companyName: document.getElementById("companyName")?.value || "",
        leadSource: document.getElementById("leadSource")?.value || "",
        priority: document.getElementById("priority")?.value || "",
        productCategory: document.getElementById("productCategory")?.value || "",
        productDetails: document.getElementById("productDetails")?.value || "",
        quantity: document.getElementById("quantity")?.value || "",
        budgetPerPiece: document.getElementById("budgetPerPiece")?.value || "",
        expectedOrderValue: document.getElementById("expectedOrderValue")?.value || "",
        expectedDeliveryDate: document.getElementById("expectedDeliveryDate")?.value || "",
        brandingRequired: "",
        brandingReferenceImages: "",
        productReferenceImages: "",
        discussionNotes: document.getElementById("discussionNotes")?.value || ""
    };

    try {

        await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify(data)
        });

        alert("Enquiry Saved Successfully");

    } catch(error){

        alert("Error Saving Enquiry");
        console.log(error);

    }
}

</script>
<body>

<div class="container">

    <h1>NEW ENQUIRY</h1>

    <!-- CLIENT INFORMATION -->

    <div class="card">

        <h2>CLIENT INFORMATION</h2>

        <div class="grid-2">

            <input type="text" placeholder="Client Name">
            <input type="text" id="companyName" placeholder="Company Name">

            <input type="text" placeholder="Contact Person">
            <input type="text" placeholder="Mobile Number">

            <input type="text" placeholder="Designation">
            <input type="email" placeholder="Email ID">

            <input type="text" placeholder="Department">
            <input type="text" placeholder="City">

        </div>

    </div>

    <!-- LEAD SOURCE -->

    <div class="card">

        <h2>LEAD SOURCE</h2>

        <div class="grid-3">

            <select id="leadSource">
                <option>Select Source</option>
                <option>WhatsApp</option>
                <option>Google</option>
                <option>Reference</option>
                <option>LinkedIn</option>
                <option>Website</option>
                <option>IndiaMart</option>
                <option>Walk In</option>
            </select>

            <input type="date">

            <select id="priority">
                <option>Priority</option>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>

        </div>

    </div>

    <!-- INITIAL REQUIREMENT -->

    <div class="card">

        <h2>INITIAL REQUIREMENT</h2>

        <div class="grid-2">

            <input type="text" id="productCategory" placeholder="Product Category">
<input type="text" id="productDetails" placeholder="Product Details">

<input type="number" id="quantity" placeholder="Approx Quantity">
<input type="text" id="budgetPerPiece" placeholder="Budget Per Piece">

<input type="date" id="expectedDeliveryDate">
<input type="text" id="expectedOrderValue" placeholder="Expected Order Value">

<textarea id="discussionNotes" placeholder="Discussion Notes"></textarea>

    </div>

    <!-- ACTION BUTTONS -->

    <div class="button-area">

        <button class="save-btn" onclick="saveEnquiry()">
    Save Enquiry
        </button>

        <button class="clear-btn" type="reset">
            Clear
        </button>

    </div>

</div>

</body>
</html>
